---
name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ github.repository }} with Idris2 latest
    runs-on: ubuntu-latest
    env:
      PACK_DIR: /root/.pack
    strategy:
      fail-fast: false
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install --yes libcrypt-dev
          echo "=== Library Locations ==="
          ldconfig -p | grep crypt
          echo -e "\n=== Symbol Check ==="
          nm -D /usr/lib/x86_64-linux-gnu/libcrypt.so.* 2>/dev/null | grep crypt_gensalt_rn || echo "Symbol not found in runtime libs"
      - name: Build lib
        run: pack --no-prompt install crypt
      - name: Run test
        run: |
          pack --no-prompt install-app crypt-test
          ldd test/build/exec/crypt-test_app/libcrypt-idris.so
